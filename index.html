<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da Marcolino - Calcolatrice Comande</title>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosso-napoli: #D81B1B;
            --rosso-profondo: #9B0D0D;
            --nero-inchiostro: #0D0D0D;
            --bianco-carta: #FFFDF5;
            --avorio: #F0EBD8;
            --extra-green: #2d5a27;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--avorio);
            color: var(--nero-inchiostro);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        header h1 {
            font-family: 'Alfa Slab One', cursive;
            color: var(--rosso-napoli);
            margin: 0;
            text-transform: uppercase;
            font-size: 2rem;
        }

        /* DISPLAY COMANDA STILE "SCONTRINO" */
        #display {
            background: var(--bianco-carta);
            width: 100%;
            max-width: 800px;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 5px;
            z-index: 1000;
        }

        .comanda-lista {
            max-height: 180px;
            overflow-y: auto;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            border-bottom: 2px dashed #ccc;
            margin-bottom: 10px;
            padding-bottom: 10px;
        }

        .item-line { display: flex; justify-content: space-between; margin-bottom: 4px; }

        .current-build {
            font-weight: 600;
            color: var(--rosso-profondo);
            min-height: 1.5em;
            font-size: 1.2rem;
        }

        .totale-riga {
            font-family: 'Alfa Slab One', sans-serif;
            font-size: 2.5rem;
            color: var(--rosso-napoli);
            text-align: right;
            margin-top: 5px;
        }

        /* GRIGLIE E PULSANTI */
        .section-label {
            width: 100%;
            max-width: 800px;
            background: var(--nero-inchiostro);
            color: var(--bianco-carta);
            padding: 5px 15px;
            margin: 15px 0 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 6px;
            width: 100%;
            max-width: 800px;
        }

        .cell {
            aspect-ratio: 1/1;
            background: var(--bianco-carta);
            border: 2px solid var(--nero-inchiostro);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
            padding: 4px;
        }

        .cell:active { transform: scale(0.95); }
        .cell.active { background: var(--rosso-napoli); color: white; border-color: var(--rosso-profondo); }

        .cell .symbol { font-family: 'Alfa Slab One'; font-size: 1.4rem; }
        .cell .price { font-size: 0.75rem; font-weight: bold; }
        .cell .name { font-size: 0.6rem; text-transform: uppercase; margin-top: 2px; line-height: 1; }

        /* PULSANTI AZIONE */
        .action-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 800px;
            margin: 20px 0;
        }

        .btn {
            padding: 15px;
            font-family: 'Oswald';
            font-weight: bold;
            text-transform: uppercase;
            border: 2px solid var(--nero-inchiostro);
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-add { background: var(--rosso-napoli); color: white; grid-column: span 2; font-size: 1.3rem; }
        .btn-del { background: #fff; color: var(--nero-inchiostro); }
        .btn-reset { background: var(--nero-inchiostro); color: white; }
        .btn-opt.active { background: var(--rosso-profondo); color: white; }

    </style>
</head>
<body>

    <header>
        <h1>Da Marcolino</h1>
        <small>TRATTORIA • PIZZERIA • STROPPIANA</small>
    </header>

    <div id="display">
        <div class="comanda-lista" id="lista-comanda">Comanda vuota</div>
        <div class="current-build" id="build-text">Seleziona una pizza...</div>
        <div class="totale-riga" id="totale">0.00 €</div>
    </div>

    <div class="action-bar">
        <button class="btn btn-add" onclick="addCurrent()">➕ AGGIUNGI ALL'ORDINE</button>
        <button class="btn btn-del" onclick="removeLast()">↩️ RIMUOVI ULTIMA</button>
        <button class="btn btn-reset" onclick="resetAll()">🗑️ SVUOTA TUTTO</button>
        <button class="btn btn-opt" id="btn-trasporto" onclick="toggleTrasporto()">🚚 TRASPORTO (+2.50)</button>
        <button class="btn btn-opt" id="btn-doppio" onclick="toggleDoppio()">🍞 DOPPIO IMPASTO (+1.50)</button>
    </div>

    <div class="section-label">Le Classiche</div>
    <div class="grid" id="grid-cl"></div>

    <div class="section-label">Le Speciali</div>
    <div class="grid" id="grid-sp"></div>

    <div class="section-label">Ingredienti Extra</div>
    <div class="grid" id="grid-ex"></div>

    <script>
        // Dati estratti dal menu ufficiale e dalla brand identity
        const pizze = [
            { id: 'Fc', n: 'Focaccia', p: 4.0, c: 'cl' }, { id: 'Ma', n: 'Marinara', p: 4.5, c: 'cl' },
            { id: 'Mg', n: 'Margherita', p: 5.0, c: 'cl' }, { id: 'Pr', n: 'Prosciutto', p: 7.0, c: 'cl' },
            { id: 'PF', n: 'Prosc. Funghi', p: 7.0, c: 'cl' }, { id: 'Di', n: 'Diavola', p: 7.0, c: 'cl' },
            { id: '4S', n: '4 Stagioni', p: 7.0, c: 'cl' }, { id: 'Na', n: 'Napoli', p: 7.0, c: 'cl' },
            { id: 'Ro', n: 'Romana', p: 7.0, c: 'cl' }, { id: 'Ve', n: 'Vegetariana', p: 7.0, c: 'cl' },
            { id: 'Cp', n: 'Capricciosa', p: 8.0, c: 'cl' }, { id: 'TC', n: 'Tonno Cip.', p: 8.0, c: 'cl' },
            { id: '4F', n: '4 Formaggi', p: 8.0, c: 'cl' }, { id: 'Rg', n: 'Regina', p: 8.0, c: 'cl' },
            { id: 'Pa', n: 'Patapizza', p: 7.5, c: 'sp' }, { id: 'Pm', n: 'Parmigiana', p: 7.5, c: 'sp' },
            { id: 'Am', n: 'Americana', p: 8.0, c: 'sp' }, { id: 'SF', n: 'Salsiccia Fri.', p: 8.0, c: 'sp' },
            { id: 'Sa', n: 'Saporita', p: 8.0, c: 'sp' }, { id: 'Es', n: 'Estiva', p: 8.0, c: 'sp' },
            { id: 'Tn', n: 'Tonnara', p: 8.0, c: 'sp' }, { id: 'Mc', n: 'Marcolino', p: 8.5, c: 'sp' },
            { id: 'Cb', n: 'Calabrese', p: 8.5, c: 'sp' }, { id: 'Lo', n: 'Longobarda', p: 8.5, c: 'sp' },
            { id: 'Bo', n: 'Boscaiola', p: 8.5, c: 'sp' }, { id: 'Ca', n: 'Calamari Fr.', p: 9.0, c: 'sp' },
            { id: 'De', n: 'Delizia', p: 9.0, c: 'sp' }, { id: 'Ne', n: 'Nerano', p: 9.0, c: 'sp' },
            { id: 'Be', n: 'Bella', p: 10.0, c: 'sp' }, { id: 'Rs', n: 'Rosita', p: 10.0, c: 'sp' },
            { id: 'No', n: 'Nordica', p: 10.0, c: 'sp' }, { id: 'Mn', n: 'Montanara', p: 10.0, c: 'sp' },
            { id: 'Ti', n: 'Tramonto It.', p: 10.0, c: 'sp' }, { id: 'Mz', n: 'Mortazza', p: 11.0, c: 'sp' }
        ];

        const ingredienti = [
            { id: 'Pt', n: 'Patatine', p: 1.5 }, { id: 'Br', n: 'Burrata', p: 2.5 },
            { id: 'Mo', n: 'Mozzarella', p: 1.0 }, { id: 'Cu', n: 'Crudo', p: 2.0 },
            { id: 'Vd', n: 'Verdure', p: 1.0 }, { id: 'Nj', n: 'Nduja', p: 1.5 }
        ];

        let comanda = [];
        let current = { base: null, extras: [], doppio: false };
        let trasporto = 0;

        function init() {
            const grids = { cl: document.getElementById('grid-cl'), sp: document.getElementById('grid-sp') };
            pizze.forEach(p => {
                const div = createCell(p, () => { current.base = p; update(); });
                grids[p.c].appendChild(div);
            });
            const exGrid = document.getElementById('grid-ex');
            ingredienti.forEach(i => {
                const div = createCell(i, () => toggleExtra(i), true);
                exGrid.appendChild(div);
            });
        }

        function createCell(obj, action, isExtra = false) {
            const div = document.createElement('div');
            div.className = 'cell';
            if(isExtra) div.id = `ex-${obj.id}`;
            div.innerHTML = `<div class="price">${obj.p.toFixed(1)}€</div><div class="symbol">${obj.id}</div><div class="name">${obj.n}</div>`;
            div.onclick = action;
            return div;
        }

        function toggleExtra(i) {
            const idx = current.extras.findIndex(x => x.id === i.id);
            if(idx > -1) current.extras.splice(idx, 1);
            else current.extras.push(i);
            document.getElementById(`ex-${i.id}`).classList.toggle('active');
            update();
        }

        function toggleDoppio() { current.doppio = !current.doppio; document.getElementById('btn-doppio').classList.toggle('active'); update(); }
        function toggleTrasporto() { trasporto = trasporto === 0 ? 2.5 : 0; document.getElementById('btn-trasporto').classList.toggle('active'); update(); }

        function update() {
            let txt = current.base ? current.base.n : "";
            current.extras.forEach(e => txt += ` + ${e.n}`);
            if(current.doppio) txt += " (D.I.)";
            document.getElementById('build-text').innerText = txt || "Seleziona una pizza...";

            let runningTot = comanda.reduce((a, b) => a + b.p, 0);
            let curTot = current.base ? current.base.p : 0;
            current.extras.forEach(e => curTot += e.p);
            if(current.doppio) curTot += 1.5;

            document.getElementById('totale').innerText = (runningTot + curTot + trasporto).toFixed(2) + " €";
        }

        function addCurrent() {
            if(!current.base) return;
            let p = current.base.p;
            let n = current.base.n;
            current.extras.forEach(e => { p += e.p; n += ` + ${e.n}`; });
            if(current.doppio) { p += 1.5; n += " (D.I.)"; }
            
            comanda.push({ n, p });
            current = { base: null, extras: [], doppio: false };
            document.querySelectorAll('.cell, .btn-opt').forEach(el => { if(el.id !== 'btn-trasporto') el.classList.remove('active'); });
            renderComanda();
            update();
        }

        function renderComanda() {
            const l = document.getElementById('lista-comanda');
            if(comanda.length === 0) { l.innerText = "Comanda vuota"; return; }
            l.innerHTML = comanda.map(i => `<div class="item-line"><span>${i.n}</span><span>${i.p.toFixed(2)}€</span></div>`).join('');
            l.scrollTop = l.scrollHeight;
        }

        function removeLast() { comanda.pop(); renderComanda(); update(); }
        function resetAll() { if(confirm("Azzero tutto?")) { comanda = []; trasporto = 0; resetUI(); update(); renderComanda(); } }
        function resetUI() { document.querySelectorAll('.active').forEach(e => e.classList.remove('active')); }

        init();
    </script>
</body>
</html>
