<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da Marcolino - Pizza Calc Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosso-napoli: #D81B1B; /*  */
            --nero-inchiostro: #0D0D0D; /*  */
            --bianco-carta: #FFFDF5; /*  */
            --avorio: #F0EBD8; /*  */
            --verde-go: #27ae60;
            --giallo-warn: #f1c40f;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--avorio);
            color: var(--nero-inchiostro);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* DISPLAY STILE CALCOLATRICE LCD */
        #calculator-screen {
            background: #222;
            width: 95%; max-width: 600px;
            padding: 15px;
            border-radius: 10px;
            border: 4px solid #444;
            box-shadow: inset 0 0 10px #000;
            margin-bottom: 20px;
            color: #00ff41; /* Verde Matrix/LCD */
            font-family: 'Share Tech Mono', monospace;
        }

        .lcd-history { height: 80px; overflow-y: auto; font-size: 0.85rem; border-bottom: 1px solid #333; margin-bottom: 10px; opacity: 0.8; }
        .lcd-current { font-size: 1.1rem; min-height: 1.4em; color: #fff; }
        .lcd-total { font-size: 3rem; text-align: right; font-weight: bold; color: var(--giallo-warn); }

        /* TASTI FUNZIONE CIRCOLARI */
        .circle-actions {
            display: flex; justify-content: space-around;
            width: 100%; max-width: 600px; margin-bottom: 25px;
        }

        .btn-circle {
            width: 75px; height: 75px; border-radius: 50%;
            border: 3px solid var(--nero-inchiostro);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-size: 0.7rem; font-weight: bold; cursor: pointer;
            transition: 0.2s; text-transform: uppercase; text-align: center;
            box-shadow: 0 4px 0 var(--nero-inchiostro);
        }

        .btn-circle:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--nero-inchiostro); }
        .btn-add { background: var(--verde-go); color: white; }
        .btn-undo { background: var(--giallo-warn); color: black; }
        .btn-clear { background: var(--rosso-napoli); color: white; }

        /* GRIGLIA PIZZE */
        .section-label { width: 100%; max-width: 800px; font-family: 'Alfa Slab One'; color: var(--rosso-napoli); margin: 15px 0; border-bottom: 2px solid var(--nero-inchiostro); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; width: 100%; max-width: 800px; }
        
        .cell {
            aspect-ratio: 1/1; background: var(--bianco-carta); border: 2px solid var(--nero-inchiostro);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; position: relative;
        }
        .cell.active { background: var(--nero-inchiostro); color: var(--avorio); }
        .cell .price { position: absolute; top: 2px; right: 4px; font-size: 0.7rem; font-weight: bold; }
        .cell .symbol { font-family: 'Alfa Slab One'; font-size: 1.3rem; }
        .cell .name { font-size: 0.55rem; text-transform: uppercase; text-align: center; padding: 0 2px; }

        .cat-sp { border-color: var(--rosso-napoli); color: var(--rosso-napoli); }
        .cat-ex { border-style: dashed; }

        .toggle-wide {
            width: 100%; max-width: 800px; margin-top: 15px;
            padding: 15px; background: var(--bianco-carta); border: 2px solid var(--nero-inchiostro);
            font-family: 'Oswald'; font-weight: bold; cursor: pointer;
        }
        .toggle-wide.active { background: var(--rosso-napoli); color: white; }
    </style>
</head>
<body>

    <div id="calculator-screen">
        <div class="lcd-history" id="history">Comanda Vuota...</div>
        <div class="lcd-current" id="current-str">Seleziona Pizza</div>
        <div class="lcd-total" id="total-val">0.00</div>
    </div>

    <div class="circle-actions">
        <div class="btn-circle btn-clear" onclick="resetAll()">C<br>Reset</div>
        <div class="btn-circle btn-undo" onclick="removeLast()">←<br>Canc</div>
        <div class="btn-circle btn-add" onclick="pushToHistory()">+<br>Invio</div>
    </div>

    <button class="toggle-wide" id="btn-trasporto" onclick="toggleOption('trasporto', 2.5)">🚚 AGGIUNGI TRASPORTO (+2.50€)</button>
    <button class="toggle-wide" id="btn-doppio" onclick="toggleOption('doppio', 1.5)">🍞 DOPPIO IMPASTO (+1.50€)</button>

    <div class="section-label">Menu Pizze</div>
    <div class="grid" id="pizza-grid"></div>

    <div class="section-label">Extra</div>
    <div class="grid" id="extra-grid"></div>

    <script>
        const pizze = [
            { id: 'Mg', n: 'Margherita', p: 5.0, c: 'cl' }, { id: 'Ma', n: 'Marinara', p: 4.5, c: 'cl' },
            { id: 'Di', n: 'Diavola', p: 7.0, c: 'cl' }, { id: 'Rg', n: 'Regina', p: 8.0, c: 'cl' },
            { id: '4S', n: '4 Stagioni', p: 7.0, c: 'cl' }, { id: 'Mz', n: 'Mortazza', p: 11.0, c: 'sp' },
            { id: 'Ne', n: 'Nerano', p: 9.0, c: 'sp' }, { id: 'Ti', n: 'Tramonto', p: 10.0, c: 'sp' },
            { id: 'Mc', n: 'Marcolino', p: 8.5, c: 'sp' }, { id: 'Be', n: 'Bella', p: 10.0, c: 'sp' }
            // Aggiungi qui le altre dal PDF... [cite: 1, 68, 101]
        ];

        const extras = [
            { id: 'Pt', n: 'Patatine', p: 1.5 }, { id: 'Bu', n: 'Burrata', p: 2.5 },
            { id: 'Ex', n: 'Mozzarella', p: 1.0 }, { id: 'Cr', n: 'Crudo', p: 2.0 }
        ];

        let comanda = [];
        let cur = { base: null, extras: [], doppio: false };
        let trasporto = false;

        function init() {
            const pG = document.getElementById('pizza-grid');
            pizze.forEach(p => {
                const d = document.createElement('div');
                d.className = `cell ${p.c === 'sp' ? 'cat-sp' : ''}`;
                d.innerHTML = `<div class="price">${p.p}</div><div class="symbol">${p.id}</div><div class="name">${p.n}</div>`;
                d.onclick = () => { cur.base = p; update(); };
                pG.appendChild(d);
            });

            const eG = document.getElementById('extra-grid');
            extras.forEach(e => {
                const d = document.createElement('div');
                d.className = `cell cat-ex`;
                d.id = `ex-${e.id}`;
                d.innerHTML = `<div class="price">+${e.p}</div><div class="symbol">${e.id}</div><div class="name">${e.n}</div>`;
                d.onclick = () => {
                    const i = cur.extras.findIndex(x => x.id === e.id);
                    if(i > -1) cur.extras.splice(i, 1); else cur.extras.push(e);
                    d.classList.toggle('active');
                    update();
                };
                eG.appendChild(d);
            });
        }

        function toggleOption(id, val) {
            if(id === 'trasporto') trasporto = !trasporto;
            else cur.doppio = !cur.doppio;
            document.getElementById(`btn-${id}`).classList.toggle('active');
            update();
        }

        function update() {
            let s = cur.base ? cur.base.n : "---";
            cur.extras.forEach(e => s += " + " + e.n);
            if(cur.doppio) s += " (D.I.)";
            document.getElementById('current-str').innerText = s;

            let t = comanda.reduce((acc, v) => acc + v.p, 0);
            let c = cur.base ? cur.base.p : 0;
            cur.extras.forEach(e => c += e.p);
            if(cur.doppio) c += 1.5;
            if(trasporto) t += 2.5;

            document.getElementById('total-val').innerText = (t + c).toFixed(2);
        }

        function pushToHistory() {
            if(!cur.base) return;
            let p = cur.base.p + cur.extras.reduce((a,b) => a + b.p, 0) + (cur.doppio ? 1.5 : 0);
            let n = cur.base.n + (cur.extras.length ? " +" + cur.extras.length + "ex" : "");
            comanda.push({ n, p });
            cur = { base: null, extras: [], doppio: false };
            document.querySelectorAll('.cat-ex, #btn-doppio').forEach(el => el.classList.remove('active'));
            renderHistory();
            update();
        }

        function renderHistory() {
            const h = document.getElementById('history');
            h.innerHTML = comanda.map((v, i) => `<div>${i+1}. ${v.n} - ${v.p.toFixed(2)}</div>`).join('');
            h.scrollTop = h.scrollHeight;
        }

        function removeLast() { comanda.pop(); renderHistory(); update(); }
        function resetAll() { if(confirm("Resetti tutto?")) { comanda=[]; trasporto=false; cur={base:null, extras:[], doppio:false}; document.querySelectorAll('.active').forEach(e => e.classList.remove('active')); renderHistory(); update(); } }

        init();
    </script>
</body>
</html>
